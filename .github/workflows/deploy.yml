name: Deploy mdBook
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable
      - run: cargo install mdbook
      - run: mdbook test
      - run: mdbook build
      - name: Bundle src/ as rust-book-src.zip for AI consumption
        run: |
          mkdir _stage
          cp -r src _stage/rust-book
          (cd _stage && zip -r ../book/rust-book-src.zip rust-book)
          rm -rf _stage
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./book
      - id: deployment
        uses: actions/deploy-pages@v5